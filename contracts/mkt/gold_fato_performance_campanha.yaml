id: "mkt:data_product:fato_performance_campanha"
version: "1.0.0"
domain: "marketing"
data_product_name: "fato_performance_campanha"
owner: "team-marketing-analytics@empresa.com"
status: "active"

schema:
  - name: "id_campanha"
    type: "integer"
    description: "ID único identificador da campanha de marketing"
    primary_key: true
  - name: "nome"
    type: "string"
    description: "Nome comercial da campanha"
  - name: "tipo"
    type: "string"
    description: "Canal/Tipo da campanha (ex: Paid Search, Social, Email)"
  - name: "objetivo"
    type: "string"
    description: "Objetivo estratégico (ex: Conversão, Awareness, Consideração)"
  - name: "orcamento"
    type: "double"
    description: "Orçamento financeiro total planejado e alocado para a campanha"
  - name: "gasto_real"
    type: "double"
    description: "Valor financeiro total efetivamente gasto na campanha até o momento"
  - name: "status"
    type: "string"
    description: "Status atual de veiculação da campanha (ex: Ativa, Pausada, Finalizada)"
  - name: "ingest_timestamp"
    type: "timestamp"
    description: "Data e hora exata em que o registro foi processado e inserido na camada Gold"
  - name: "data_inicio"
    type: "date"
    description: "Data de início da veiculação dos anúncios/disparos"
  - name: "data_fim"
    type: "date"
    description: "Data prevista ou real de encerramento da campanha"
  - name: "total_impressoes"
    type: "integer"
    description: "Quantidade total de vezes que os anúncios da campanha foram exibidos"
  - name: "total_cliques"
    type: "integer"
    description: "Quantidade total de cliques recebidos nos anúncios da campanha"
  - name: "custo_anuncios"
    type: "double"
    description: "Custo total acumulado especificamente com plataformas de mídia paga (AdExchanges)"
  - name: "total_emails_enviados"
    type: "integer"
    description: "Volume total de e-mails marketing disparados nesta campanha"
  - name: "total_emails_abertos"
    type: "integer"
    description: "Volume total de aberturas únicas de e-mails registradas"
  - name: "total_cliques_emails"
    type: "integer"
    description: "Total de cliques em links internos contidos nos e-mails disparados"
  - name: "total_emails_descadastrados"
    type: "integer"
    description: "Quantidade de usuários que solicitaram descadastramento (opt-out) da lista nesta campanha"
  - name: "total_curtidas"
    type: "integer"
    description: "Métrica de engajamento: total de curtidas acumuladas nas postagens da campanha"
  - name: "total_comentarios"
    type: "integer"
    description: "Métrica de engajamento: total de comentários gerados nas publicações"
  - name: "total_compartilhamentos"
    type: "integer"
    description: "Métrica de engajamento: total de vezes que o conteúdo foi compartilhado"

governance:
  classification: "internal" # Opções: public, internal, confidential, restricted
  contains_pii: false        # Como esta tabela é agregada, não possui dados sensíveis expostos

service_level_agreements:
  freshness: "hourly"        # Campanhas ativas exigem monitoramento quase em tempo real
  completeness:
    column: "id_campanha"
    min_threshold_pct: 100.0 # Nenhuma linha pode ter o ID da campanha nulo
  integrity:
    non_negative_columns:
      - "total_impressoes"
      - "total_cliques"
      - "total_emails_enviados"
      - "total_emails_abertos"
      - "total_cliques_emails"
      - "total_emails_descadastrados"
      - "total_curtidas"
      - "total_comentarios"
      - "total_compartilhamentos"