# Data Contract Specification v1.0
id: "rh:data_product:dim_colaborador"
version: "1.0.0"
domain: "recursos_humanos"
data_product_name: "dim_colaborador"
owner: "team-rh-analytics@empresa.com"
status: "active"

schema:
  - name: "colaborador_sk"
    type: "string"
    description: "Chave surrogate estavel do colaborador"
    primary_key: true
  - name: "colaborador_id"
    type: "integer"
    description: "Identificador natural do colaborador"
  - name: "nome"
    type: "string"
    description: "Nome do colaborador"
  - name: "matricula"
    type: "string"
    description: "Matricula corporativa do colaborador"
  - name: "status"
    type: "string"
    description: "Status atual do colaborador"
  - name: "tipo_vinculo"
    type: "string"
    description: "Tipo de vinculo contratual"
  - name: "data_admissao"
    type: "date"
    description: "Data de admissao"
  - name: "data_desligamento"
    type: "date"
    description: "Data de desligamento, quando existir"
  - name: "cargo_id"
    type: "integer"
    description: "Identificador natural do cargo"
  - name: "nome_cargo"
    type: "string"
    description: "Nome do cargo"
  - name: "departamento_id"
    type: "integer"
    description: "Identificador natural do departamento"
  - name: "nome_departamento"
    type: "string"
    description: "Nome do departamento"
  - name: "turno_id"
    type: "integer"
    description: "Identificador natural do turno"
  - name: "nome_turno"
    type: "string"
    description: "Nome do turno"
  - name: "gerente_id"
    type: "integer"
    description: "Identificador natural do gerente"
  - name: "nome_gerente"
    type: "string"
    description: "Nome do gerente"
  - name: "cpf_mascarado"
    type: "string"
    description: "CPF mascarado para uso analitico"
  - name: "email_mascarado"
    type: "string"
    description: "Email mascarado para uso analitico"

governance:
  classification: "confidential"
  contains_pii: true
  pii_columns:
    - "nome"
    - "nome_gerente"
    - "cpf_mascarado"
    - "email_mascarado"

service_level_agreements:
  freshness: "daily"
  completeness:
    column: "colaborador_sk"
    min_threshold_pct: 100.0
  integrity:
    non_negative_columns:
      - "colaborador_id"
      - "cargo_id"
      - "departamento_id"
      - "turno_id"
      - "gerente_id"
