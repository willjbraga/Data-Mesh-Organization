# Data Contract Specification v1.0
id: "rh:data_product:gold_absenteismo_mensal"
version: "1.0.0"
domain: "recursos_humanos"
data_product_name: "gold_absenteismo_mensal"
owner: "team-rh-analytics@empresa.com"
status: "active"

schema:
  - name: "ano_mes"
    type: "string"
    description: "Ano e mes da competencia"
    primary_key: true
  - name: "nome_unidade"
    type: "string"
    description: "Nome da unidade"
    primary_key: true
  - name: "nome_departamento"
    type: "string"
    description: "Nome do departamento"
    primary_key: true
  - name: "tipo_ausencia"
    type: "string"
    description: "Tipo da ausencia"
    primary_key: true
  - name: "qtd_ausencias"
    type: "integer"
    description: "Quantidade de ausencias"
  - name: "dias_ausencia"
    type: "integer"
    description: "Total de dias de ausencia"
  - name: "media_dias_por_ausencia"
    type: "double"
    description: "Media de dias por ausencia"

governance:
  classification: "confidential"
  contains_pii: false

service_level_agreements:
  freshness: "daily"
  completeness:
    column: "ano_mes"
    min_threshold_pct: 100.0
  integrity:
    non_negative_columns:
      - "qtd_ausencias"
      - "dias_ausencia"
      - "media_dias_por_ausencia"
