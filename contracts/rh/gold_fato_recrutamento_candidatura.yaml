# Data Contract Specification v1.0
id: "rh:data_product:fato_recrutamento_candidatura"
version: "1.0.0"
domain: "recursos_humanos"
data_product_name: "fato_recrutamento_candidatura"
owner: "team-rh-analytics@empresa.com"
status: "active"

schema:
  - name: "candidatura_id"
    type: "integer"
    description: "Identificador natural da candidatura"
    primary_key: true
  - name: "data_candidatura_sk"
    type: "integer"
    description: "Chave da data da candidatura"
  - name: "vaga_sk"
    type: "string"
    description: "Chave surrogate da vaga"
  - name: "candidato_sk"
    type: "string"
    description: "Chave surrogate do candidato"
  - name: "departamento_sk"
    type: "string"
    description: "Chave surrogate do departamento"
  - name: "origem_candidatura"
    type: "string"
    description: "Origem da candidatura"
  - name: "etapa_atual"
    type: "string"
    description: "Etapa atual da candidatura"
  - name: "status_candidatura"
    type: "string"
    description: "Status da candidatura"
  - name: "qtd_candidatura"
    type: "integer"
    description: "Contador de candidatura"
  - name: "pretensao_salarial"
    type: "double"
    description: "Pretensao salarial informada"
  - name: "flag_em_analise"
    type: "integer"
    description: "Flag 1/0 para candidatura em analise"
  - name: "flag_aprovada"
    type: "integer"
    description: "Flag 1/0 para candidatura aprovada"
  - name: "flag_recusada"
    type: "integer"
    description: "Flag 1/0 para candidatura recusada"
  - name: "flag_desistente"
    type: "integer"
    description: "Flag 1/0 para candidatura desistente"
  - name: "flag_contratada"
    type: "integer"
    description: "Flag 1/0 para candidatura contratada"

governance:
  classification: "confidential"
  contains_pii: false

service_level_agreements:
  freshness: "daily"
  completeness:
    column: "candidatura_id"
    min_threshold_pct: 100.0
  integrity:
    non_negative_columns:
      - "candidatura_id"
      - "data_candidatura_sk"
      - "qtd_candidatura"
      - "pretensao_salarial"
      - "flag_em_analise"
      - "flag_aprovada"
      - "flag_recusada"
      - "flag_desistente"
      - "flag_contratada"
